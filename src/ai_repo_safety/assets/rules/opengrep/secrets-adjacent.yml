rules:
  - id: hardcoded-jwt-secret
    message: JWT secret appears hardcoded.
    severity: ERROR
    languages:
      - python
    pattern: jwt.encode($DATA, "...", ...)

  - id: sql-fstring
    message: SQL built with f-string can lead to injection.
    severity: ERROR
    languages:
      - python
    pattern-regex: "(execute|executemany)\\(\\s*f[\"'].*(SELECT|INSERT|UPDATE|DELETE)"
