name: sast

on:
  pull_request:
  push:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  python-sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'
      - name: Install Python scanners
        run: |
          python -m pip install --upgrade pip
          pip install bandit ruff pip-audit
      - name: Bandit
        run: bandit -q -r src -x tests,.venv,venv
      - name: Ruff
        run: ruff check .
      - name: pip-audit
        run: pip-audit

  opengrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Opengrep placeholder
        run: |
          echo "Install Opengrep from official current stable docs, then run:"
          echo "opengrep --config .repo-safety/opengrep ."
          echo "This workflow is intentionally non-installing to avoid unpinned installer snippets."
