name: supply-chain

on:
  pull_request:
  push:
    branches: [main, dev]
  schedule:
    - cron: '0 4 * * 1'

permissions:
  contents: read

jobs:
  osv:
    permissions:
      actions: read
      security-events: write
      contents: read
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    with:
      scan-args: |-
        --recursive
        ./

  python-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: pip-audit
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit
