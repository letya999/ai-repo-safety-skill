# Merge these sections into pyproject.toml if you want repo-level Python security defaults.

[tool.bandit]
exclude_dirs = ["tests", ".venv", "venv", "build", "dist"]
skips = []

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "S", "UP"]
ignore = []
